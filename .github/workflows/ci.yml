name: Lauren English CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and Spring backend
  build-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: loipt
          POSTGRES_PASSWORD: qwerty
          POSTGRES_DB: lauren-english
          POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: src/backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/lauren-english
        SPRING_DATASOURCE_USERNAME: loipt
        SPRING_DATASOURCE_PASSWORD: qwerty
        SPRING_DATA_REDIS_HOST: localhost
        SPRING_DATA_REDIS_PORT: 6379
      run: mvn clean verify -Dspring.profiles.active=test
      
  # Build and Test React/Vite Frontend
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'src/frontend/package-lock.json'

    - name: Install Dependencies
      run: npm ci
    
    - name: Run ESLint
      # Fails the pipeline if there are bad React hooks or severe syntax errors
      run: npm run lint

    - name: Run Unit Tests
      # We use a special 'ci' script so it runs once and exits, rather than watching for changes
      run: npm run test:ci 

    - name: Build Vite Project
      # Only runs if both Linting and Tests pass
      run: npm run build
      
  # Build & Push Backend Docker Image
  publish-backend:
    runs-on: ubuntu-latest
    needs: build-backend 
    # Only push to DockerHub when code merges to main
    if: github.ref == 'refs/heads/main' 
    
    env:
      DOCKERHUB_USERNAME: ptloi86
      BACKEND_IMAGE_NAME: laurenenglish-backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest
          
    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: src/backend
        file: src/backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Build & Push Frontend Docker Image
  publish-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend 
    if: github.ref == 'refs/heads/main'
    
    env:
      DOCKERHUB_USERNAME: ptloi86
      FRONTEND_IMAGE_NAME: laurenenglish-frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest
          
    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: src/frontend
        file: src/frontend/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
